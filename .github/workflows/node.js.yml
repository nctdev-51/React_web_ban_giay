# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Thêm dòng này để tất cả các lệnh chạy bên trong thư mục con
    defaults:
      run:
        working-directory: web_ban_giay_ecommerce

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Báo cho nó biết file lock nằm ở đâu để cache
          cache-dependency-path: web_ban_giay_ecommerce/package-lock.json
          
      - run: npm install
      - run: npm run build --if-present
